<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Personal page</title>

    <!-- JQuery -->
    <script src="https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.5.1.min.js">
    </script>

    <!-- Semantic -->
    <link href="/semantic/semantic.min.css" rel="stylesheet">
    <script src="/semantic/semantic.min.js"></script>

    <!-- vanta.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.dots.min.js"></script>

    <!-- My stylesheet-->
    <link href="/util.css" rel="stylesheet">
</head>

<body class="darkbg">

    <!-- Include snippets -->
    <script>
        // Footer
        $(function() {
            $("#footer").load("/snippets/loadable/footer.html");
        });

        // Header
        $(function() {
            $("#header").load("/snippets/loadable/header.html");
        });

        // Sidebar
        function toggleSidebar() {
            $('.ui.sidebar')
                .sidebar('toggle');
        }

        $(function() {
            $("#sidebar").load("/snippets/loadable/sidebar.html");
            $(document).on("click", "#sidebar-trigger", toggleSidebar)
        });
    </script>

    <!-- vanta.js -->
    <script>
        window.onload = function() {
            VANTA.DOTS({
                el: ".vantabg",
                mouseControls: true,
                touchControls: false,
                gyroControls: true,
                minHeight: 100.00,
                minWidth: 100.00,
                scale: 1.00,
                scaleMobile: 1.00,
                color: 0xbf7b3f,
                color2: 0x111111,
                backgroundColor: 0x111111
            })
        }
    </script>

    <div id="sidebar"></div>

    <div class="pusher">
        <div class="fullwidth fullheight vantabg darkbg hero">
            <!-- Content of hero -->
            <div class="ui one column center aligned grid fullheight fullwidth">
                <div class="middle aligned column">
                    <div class="middle aligned large ui inverted header">Website under construction</div>
                    <div class="sub header">Please be patient, I'm working on it</div>
                </div>
            </div>
        </div>

        <div id="header"></div>

        <!-- After hero -->
        <!-- Norminal -->
        <div class="ui fullwidth norminal presenter">
            <div class="ui two column stackable grid">
                <div class="column">
                    <div class="description">
                        <div class="ui header">Norminal</div>
                        <div class="sub header">
                            An app for everything about SpaceX. Follow launches, astronauts and payloads, directly from your iPhone.
                            <br> <br> Join the TestFlight alpha now!
                        </div>
                        <a class="ui labeled icon primary button" href="https://docs.google.com/forms/d/e/1FAIpQLSc-qEGXkn_uWAf62Z8HHQtdgLjTkgZ9Ut9G8BoW0l6pWhO41w/viewform">
                            <i class="download icon"></i> Join
                        </a>
                        <a class="ui labeled icon button" href="/pages/projects/norminal.html">
                            <i class="info circle icon"></i> Info
                        </a>
                    </div>
                </div>
                <div class="column">
                    <img src="/assets/norminal1.png" alt="iPhone showing Norminal app running. " class="ui image medium norminal iphone mockup ">
                </div>
            </div>
        </div>
        <!-- TODO: Projects overview -->
        <!-- TODO: Programming languages and skills -->
        <!-- TODO: About + links + contact (+map?) -->

        <!-- Footer -->
        <div id="footer" class="fullwidth"></div>
    </div>
</body>

</html>

</html>
