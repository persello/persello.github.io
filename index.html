<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Personal page</title>

    <!-- JQuery -->
    <script src=" https://ajax.aspnetcdn.com/ajax/jQuery/jquery-3.5.1.min.js">
    </script>

    <!-- Semantic -->
    <link href="semantic/semantic.min.css" rel="stylesheet">
    <script src="semantic/semantic.min.js"></script>

    <!-- vanta.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.dots.min.js"></script>

    <!-- My stylesheet-->
    <link href="util.css" rel="stylesheet">
</head>

<body class="darkbg">

    <!-- vanta.js -->
    <script>
        window.onload = function () {
            VANTA.DOTS({
                el: ".vantabg",
                mouseControls: true,
                touchControls: false,
                gyroControls: true,
                minHeight: 100.00,
                minWidth: 100.00,
                scale: 1.00,
                scaleMobile: 2.00,
                color: 0xbf7b3f,
                color2: 0x111111,
                backgroundColor: 0x111111
            })
        }
    </script>

    <!-- Sidebar toggler -->
    <script>
        function toggleSidebar() {
            $('.ui.sidebar')
                .sidebar('toggle')
                ;
        }
    </script>

    <!-- Sidebar menu -->
    <div class="ui top inverted vertical menu darkbg sidebar overlay">
        <a class="active item">
            Home
        </a>
        <a class="item">
            Projects
        </a>
        <a class="item">
            Contact
        </a>
    </div>

    <div>
        <div class="fullwidth fullheight vantabg darkbg">
            <!-- Mobile header -->
            <div class="mobile only">
                <div class="ui padded inverted secondary pointing fixed menu">

                    <button class="item ui button" onclick="toggleSidebar()">
                        <i class="bars icon"></i>
                    </button>

                    <div class="right menu">
                        <div class="item">
                            Riccardo Persello
                        </div>
                    </div>
                </div>
            </div>

            <!-- Standard menu -->
            <div class="desktop only">
                <div class="ui padded inverted secondary pointing fixed menu">

                    <div class="item">
                        Riccardo Persello
                    </div>

                    <div class="right menu">
                        <a class="active item">
                            Home
                        </a>
                        <a class="item">
                            Projects
                        </a>
                        <a class="item">
                            Contact
                        </a>
                    </div>
                </div>
            </div>

            <!-- Content of hero -->

        </div>

        <!-- After hero -->
        <div>

        </div>
    </div>
</body>

</html>
